services:
  crunchy-web:
    build: .
    container_name: crunchy-web
    ports:
      - "3001:3001"
    volumes:
      - ./downloads:/downloads
      - ./data:/app/data
      - ./backend/multi-downloader-nx/config:/app/backend/multi-downloader-nx/config
      - ./widevine:/app/backend/multi-downloader-nx/widevine
      # Añade aquí tus librerías adicionales:
      - /e/Bibliotecas/Anime:/libraries/hdd1
      - /h/Bibliotecas/Anime:/libraries/hdd2
      - /f/Bibliotecas/Anime:/libraries/hdd3
    restart: unless-stopped
    environment:
      - PORT=3001
      - HUB_DIR=/downloads
      - LIBRARY_PATHS=/downloads,/libraries/hdd1,/libraries/hdd2,/libraries/hdd3
      - DB_PATH=/app/data/database.sqlite
